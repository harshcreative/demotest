<!-- Unbeatable Tic-Tac-Toe with choosable start & symbol -->
<div class="ttt-wrapper" style="background:#1e1e2f; padding:2rem 1rem; text-align:center; font-family:sans-serif; color:#fff;">
  <h2 style="margin-bottom:1rem;">🎯 Impossible Tic‑Tac‑Toe</h2>

  <!-- Controls -->
  <div style="display:flex; justify-content:center; gap:1.5rem; margin-bottom:1rem; flex-wrap:wrap;">
    <div>
      <span style="color:#aaa;">Your symbol:</span><br>
      <button id="sym-x" class="ttt-ctrl-btn" style="margin-right:5px;">X</button>
      <button id="sym-o" class="ttt-ctrl-btn">O</button>
    </div>
    <div>
      <span style="color:#aaa;">Who starts?</span><br>
      <button id="start-you" class="ttt-ctrl-btn" style="margin-right:5px;">You</button>
      <button id="start-ai" class="ttt-ctrl-btn">AI</button>
    </div>
    
  </div>

  <div id="ttt-start-msg" style="margin-bottom:0.5rem; font-size:0.9rem; color:#aaa;"></div>

  <div id="ttt-board" style="display:grid; grid-template-columns:repeat(3, 1fr); gap:8px; max-width:300px; margin:0 auto;"></div>

  <div id="ttt-message" style="margin-top:1rem; font-size:1rem; min-height:1.5rem;"></div>

  <button id="ttt-restart" style="margin-top:0.5rem; background:#d97757; color:#fff; border:none; padding:0.5rem 1.2rem; border-radius:8px; cursor:pointer;">
    Restart Game
  </button>
</div>

<style>
  .ttt-cell {
    aspect-ratio: 1 / 1;
    background: #2d2d44;
    border: 2px solid #4a4a6a;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.5rem;
    font-weight: bold;
    color: #fff;
    cursor: pointer;
    transition: background 0.1s;
  }
  .ttt-cell.taken { pointer-events: none; }
  .ttt-cell.X { color: #68d391; }
  .ttt-cell.O { color: #fc8181; }

  .ttt-ctrl-btn {
    background: #2d3748;
    color: #fff;
    border: 2px solid #4a4a6a;
    padding: 0.4rem 1rem;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .ttt-ctrl-btn.active {
    background: #4a5568;
    border-color: #a0aec0;
  }
</style>

<script>
(function() {
  const boardEl = document.getElementById("ttt-board");
  const messageEl = document.getElementById("ttt-message");
  const startMsgEl = document.getElementById("ttt-start-msg");
  const restartBtn = document.getElementById("ttt-restart");
  const btnStartYou = document.getElementById("start-you");
  const btnStartAi = document.getElementById("start-ai");
  const btnSymX = document.getElementById("sym-x");
  const btnSymO = document.getElementById("sym-o");

  // Game settings (defaults: human starts as X)
  let humanStarts = true;
  let humanSymbol = "X";
  let aiSymbol = "O";
  let board = Array(9).fill(null);
  let gameOver = false;
  let currentTurn = "human"; // "human" or "ai"

  const wins = [
    [0,1,2], [3,4,5], [6,7,8],
    [0,3,6], [1,4,7], [2,5,8],
    [0,4,8], [2,4,6]
  ];

  function checkWinner(b) {
    for (let [a,bIdx,c] of wins) {
      if (b[a] && b[a] === b[bIdx] && b[a] === b[c]) return b[a];
    }
    return b.every(cell => cell) ? "draw" : null;
  }

  function renderBoard() {
    boardEl.innerHTML = "";
    board.forEach((cell, idx) => {
      const div = document.createElement("div");
      div.className = "ttt-cell";
      if (cell) {
        div.textContent = cell;
        div.classList.add("taken", cell);
      }
      div.addEventListener("click", () => humanMove(idx));
      boardEl.appendChild(div);
    });
  }

  function minimax(b, isMaximizing) {
    const result = checkWinner(b);
    if (result === aiSymbol) return 10;
    if (result === humanSymbol) return -10;
    if (result === "draw") return 0;

    if (isMaximizing) {
      let best = -Infinity;
      for (let i = 0; i < 9; i++) {
        if (!b[i]) {
          b[i] = aiSymbol;
          best = Math.max(best, minimax(b, false));
          b[i] = null;
        }
      }
      return best;
    } else {
      let best = Infinity;
      for (let i = 0; i < 9; i++) {
        if (!b[i]) {
          b[i] = humanSymbol;
          best = Math.min(best, minimax(b, true));
          b[i] = null;
        }
      }
      return best;
    }
  }

  function getBestMove() {
    let bestScore = -Infinity;
    let bestMove = null;
    for (let i = 0; i < 9; i++) {
      if (!board[i]) {
        board[i] = aiSymbol;
        let score = minimax(board, false);
        board[i] = null;
        if (score > bestScore) {
          bestScore = score;
          bestMove = i;
        }
      }
    }
    return bestMove;
  }

  function makeAIMove() {
    if (gameOver || currentTurn !== "ai") return;
    const move = getBestMove();
    if (move !== null) {
      board[move] = aiSymbol;
      renderBoard();
      const result = checkWinner(board);
      if (result) {
        endGame(result);
      } else {
        currentTurn = "human";
      }
    }
  }

  function humanMove(idx) {
    if (gameOver || board[idx] || currentTurn !== "human") return;
    board[idx] = humanSymbol;
    renderBoard();
    const result = checkWinner(board);
    if (result) { endGame(result); return; }
    currentTurn = "ai";
    setTimeout(makeAIMove, 200);
  }

  function endGame(result) {
    gameOver = true;
    if (result === "draw") {
      messageEl.textContent = "Draw. Impossible to win.";
    } else if (result === humanSymbol) {
      messageEl.textContent = "You won! (This shouldn’t happen…)";
    } else {
      messageEl.textContent = "AI wins. Told you it’s impossible.";
    }
    renderBoard();
  }

  function updateUI() {
    // Update control buttons active state
    btnStartYou.classList.toggle("active", humanStarts);
    btnStartAi.classList.toggle("active", !humanStarts);
    btnSymX.classList.toggle("active", humanSymbol === "X");
    btnSymO.classList.toggle("active", humanSymbol === "O");

    // Update start message
    const who = humanStarts ? "You" : "AI";
    const symbol = humanSymbol;
    startMsgEl.textContent = `${who} start${humanStarts ? "" : "s"} | You play as ${symbol}`;
  }

  function resetGame() {
    clearTimeout(window._aiTimeout);
    board = Array(9).fill(null);
    gameOver = false;
    aiSymbol = humanSymbol === "X" ? "O" : "X";
    currentTurn = humanStarts ? "human" : "ai";
    messageEl.textContent = "";
    updateUI();
    renderBoard();

    if (!humanStarts) {
      window._aiTimeout = setTimeout(makeAIMove, 400);
    }
  }

  // Event handlers for control buttons
  btnStartYou.addEventListener("click", () => {
    if (humanStarts) return; // already set
    humanStarts = true;
    resetGame();
  });
  btnStartAi.addEventListener("click", () => {
    if (!humanStarts) return;
    humanStarts = false;
    resetGame();
  });
  btnSymX.addEventListener("click", () => {
    if (humanSymbol === "X") return;
    humanSymbol = "X";
    resetGame();
  });
  btnSymO.addEventListener("click", () => {
    if (humanSymbol === "O") return;
    humanSymbol = "O";
    resetGame();
  });
  restartBtn.addEventListener("click", resetGame);

  // Initial setup
  resetGame();
})();
</script>
