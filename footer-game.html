<!-- Unbeatable Tic-Tac-Toe with alternating starts -->
<div class="ttt-wrapper" style="background:#1e1e2f; padding:2rem 1rem; text-align:center; font-family:sans-serif; color:#fff;">
  <h2 style="margin-bottom:1rem;"> Tic‑Tac‑Toe </h2>
  
  <div id="ttt-start-msg" style="margin-bottom:0.5rem; font-size:0.9rem; color:#aaa;"></div>
  
  <div id="ttt-board" style="display:grid; grid-template-columns:repeat(3, 1fr); gap:8px; max-width:300px; margin:0 auto;"></div>
  
  <div id="ttt-message" style="margin-top:1rem; font-size:1rem; min-height:1.5rem;"></div>
  
  <button id="ttt-restart" style="margin-top:0.5rem; background:#d97757; color:#fff; border:none; padding:0.5rem 1.2rem; border-radius:8px; cursor:pointer;">New Game</button>
</div>

<style>
  .ttt-cell {
    aspect-ratio: 1 / 1;
    background: #2d2d44;
    border: 2px solid #4a4a6a;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.5rem;
    font-weight: bold;
    color: #fff;
    cursor: pointer;
    transition: background 0.1s;
  }
  .ttt-cell.taken { pointer-events: none; }
  .ttt-cell.X { color: #68d391; }
  .ttt-cell.O { color: #fc8181; }
</style>

<script>
(function() {
  const boardEl = document.getElementById("ttt-board");
  const messageEl = document.getElementById("ttt-message");
  const startMsgEl = document.getElementById("ttt-start-msg");
  const restartBtn = document.getElementById("ttt-restart");

  let board = Array(9).fill(null);
  let gameOver = false;
  let humanSymbol = "X";      // human's symbol
  let aiSymbol = "O";
  let humanStarts = true;    // true if human moves first
  let currentTurn = "human"; // "human" or "ai"

  const wins = [
    [0,1,2], [3,4,5], [6,7,8],
    [0,3,6], [1,4,7], [2,5,8],
    [0,4,8], [2,4,6]
  ];

  function checkWinner(b) {
    for (let [a,bIdx,c] of wins) {
      if (b[a] && b[a] === b[bIdx] && b[a] === b[c]) return b[a];
    }
    return b.every(cell => cell) ? "draw" : null;
  }

  function renderBoard() {
    boardEl.innerHTML = "";
    board.forEach((cell, idx) => {
      const div = document.createElement("div");
      div.className = "ttt-cell";
      if (cell) {
        div.textContent = cell;
        div.classList.add("taken", cell);
      }
      div.addEventListener("click", () => humanMove(idx));
      boardEl.appendChild(div);
    });
  }

  // Minimax: AI maximises for aiSymbol, human minimises for humanSymbol
  function minimax(b, isMaximizing) {
    const result = checkWinner(b);
    if (result === aiSymbol) return 10;
    if (result === humanSymbol) return -10;
    if (result === "draw") return 0;

    if (isMaximizing) {
      let best = -Infinity;
      for (let i = 0; i < 9; i++) {
        if (!b[i]) {
          b[i] = aiSymbol;
          best = Math.max(best, minimax(b, false));
          b[i] = null;
        }
      }
      return best;
    } else {
      let best = Infinity;
      for (let i = 0; i < 9; i++) {
        if (!b[i]) {
          b[i] = humanSymbol;
          best = Math.min(best, minimax(b, true));
          b[i] = null;
        }
      }
      return best;
    }
  }

  function getBestMove() {
    let bestScore = -Infinity;
    let bestMove = null;
    for (let i = 0; i < 9; i++) {
      if (!board[i]) {
        board[i] = aiSymbol;
        let score = minimax(board, false);
        board[i] = null;
        if (score > bestScore) {
          bestScore = score;
          bestMove = i;
        }
      }
    }
    return bestMove;
  }

  function makeAIMove() {
    if (gameOver) return;
    const move = getBestMove();
    if (move !== null) {
      board[move] = aiSymbol;
      renderBoard();
      const result = checkWinner(board);
      if (result) endGame(result);
      else {
        currentTurn = "human";
      }
    }
  }

  function humanMove(idx) {
    if (gameOver || board[idx] || currentTurn !== "human") return;
    board[idx] = humanSymbol;
    renderBoard();
    const result = checkWinner(board);
    if (result) { endGame(result); return; }
    currentTurn = "ai";
    setTimeout(makeAIMove, 200);
  }

  function endGame(result) {
    gameOver = true;
    if (result === "draw") messageEl.textContent = "Draw. Play again.";
    else if (result === humanSymbol) messageEl.textContent = "You won! (How? This shouldn't happen.)";
    else messageEl.textContent = "I won. Improve your game skill";
    renderBoard();
  }

  function setupGame() {
    board = Array(9).fill(null);
    gameOver = false;

    // Toggle who starts for this game
    humanStarts = !humanStarts;
    humanSymbol = humanStarts ? "X" : "O";
    aiSymbol = humanStarts ? "O" : "X";
    currentTurn = humanStarts ? "human" : "ai";

    startMsgEl.textContent = humanStarts ? "You start (X)" : "I starts (X), you play as O";
    messageEl.textContent = "";
    renderBoard();

    if (!humanStarts) {
      // AI moves first
      setTimeout(makeAIMove, 400);
    }
  }

  restartBtn.addEventListener("click", setupGame);

  // Initial start (human begins first game)
  humanStarts = false; // so first toggle makes it true
  setupGame();
})();
</script>
