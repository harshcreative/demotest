<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title></title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.8.3/jquery.min.js" type="text/javascript"></script>
    <script type ="text/javascript">
        function ShowCurrentTime() {

            var path = window.location.pathname;
            var pagename = path.split("/").pop();            

        var cdata = JSON.stringify({

            uname: document.getElementById("uName").value,
            umail: document.getElementById("ueMail").value,
            umob: document.getElementById("uPhoneNumber").value,
            ddl: document.getElementById("uCompany").value,
            msg: document.getElementById("uMessage").value,
            page: pagename
        });
        $.ajax({
            type: "POST",
            url: "connect1.aspx/GetCurrentTime",
            data: cdata,
            contentType: "application/json; charset=utf-8",
            dataType: "json",
            success: OnSuccess,
            error: function (response) {
                alert(response.responseText);
            }
        });
    }
    function OnSuccess(response) {
        window.location.href = "https://www.taxmanager.in";
    }
</script>
</head>
<body>
    Name<br />
    <input type="text" id="uName" /><br />
    Email<br />
    <input type="text" id="ueMail" /><br />
    Phone<br />
    <input type="text" id="uPhoneNumber" /><br />
    Company<br />
    <select id="uCompany" name="uCompany">
        <option>One</option>
        <option>Two</option>
    </select><br />
    Message<br />
    <input type="text" id="uMessage" /><br />
<input id="btnGetTime" type="button" value="Show Current Time" onclick="ShowCurrentTime()" />
</body>
</html>
