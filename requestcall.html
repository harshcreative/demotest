    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Poppins", sans-serif;
            background: #f4f5fb;
        }

       :root {
        --navy: #293595;
        --navy-dark: #1e2775;
        --navy-light: #3d4db3;
        --navy-mist: rgba(41, 53, 149, 0.08);
        --navy-glow: rgba(41, 53, 149, 0.35);
        --navy-dk: #1e277a;
        --navy-dkr: #141a54;
        --navy-lt: #3d4bbb;
        --green: #1a7f3c;
        --green-dark: #145f2d;
        --green-light: #22a34f;
        --green-mist: rgba(26, 127, 60, 0.08);
        --green-glow: rgba(26, 127, 60, 0.35);
        --green-dk: #145f2d;
        --green-lt: #22a34e;
        --green-pale: #e6f5ec;
        --bg: #f4f5fb;
        --surface: #ffffff;
        --text: #0e1124;
        --muted: #5a6078;
        --border: #dde0f0;
        --form-bg: #f4f4f4;
        --white: #ffffff;
        --gray-50: #f9f9f9;
        --gray-100: #f0f0f0;
        --gray-200: #e0e0e0;
        --gray-400: #aaaaaa;
        --gray-600: #666666;
        --gray-800: #222222;
        --accent: #6ee7a0;
        --gold: #f5c842;
        --radius-sm: 8px;
        --radius-md: 12px;
        --radius-lg: 18px;
        --radius-xl: 28px;
      }


        body.modal-open {
            overflow: auto !important;
            padding-right: 0 !important;

        }



       /* ══════════════════════════════════════════════════════════
       RIGHT FLOATING BUTTON  
    ══════════════════════════════════════════════════════════ */

      /* ── FLOATING BUTTON — BOTTOM RIGHT ── */
      .rgt-shell {
        /* display: none; */
        position: fixed;
        bottom: 24px;
        /* ← bottom instead of top */
        right: 6px;
        z-index: 1060;
      }

      .rgt-pill {
        display: inline-flex;
        align-items: center;
        border: none;
        border-radius: 50%;
        padding: 0;
        cursor: pointer;
        overflow: hidden;
        box-shadow:
          0 10px 30px var(--navy-glow),
          0 2px 8px rgba(0, 0, 0, 0.1);
        transition:
          transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1),
          box-shadow 0.25s ease;
        background: transparent;
      }

      .rgt-pill:hover {
        transform: translateY(-4px) scale(1.02);
        box-shadow:
          0 18px 44px var(--navy-glow),
          0 4px 12px rgba(0, 0, 0, 0.12);
      }

      .rgt-icon-half {
        width: 48px;
        height: 52px;
        background: var(--navy);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        color: #fff;
        position: relative;
        flex-shrink: 0;
      }

      .rgt-ring {
        position: absolute;
        inset: -5px;
        border-radius: 50%;
        border: 2px solid rgba(255, 255, 255, 0.3);
        animation: rgt-ring 2.4s ease-out infinite;
        pointer-events: none;
      }

      @keyframes rgt-ring {
        0% {
          transform: scale(0.8);
          opacity: 0.8;
        }

        75% {
          transform: scale(1.55);
          opacity: 0;
        }

        100% {
          transform: scale(1.55);
          opacity: 0;
        }
      }

      .rgt-dot {
        position: absolute;
        top: 10px;
        right: 9px;
        width: 9px;
        height: 9px;
        background: var(--green);
        border: 2px solid var(--navy);
        border-radius: 50%;
        animation: lft-blink 1.9s ease-in-out infinite;
      }

      @keyframes lft-blink {
        0%,
        100% {
          opacity: 1;
        }

        50% {
          opacity: 0.3;
        }
      }

      .rgt-text-half {
        background: var(--green);
        height: 56px;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        justify-content: center;
        padding: 0 9px 0 7px;
        position: relative;
        display: none;
        overflow: hidden;
      }

      .rgt-text-half::before {
        content: "";
        position: absolute;
        top: 0;
        left: -80%;
        width: 55%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.18),
          transparent
        );
        transform: skewX(-18deg);
        animation: rgt-shimmer 3.2s ease-in-out infinite;
      }

      @keyframes rgt-shimmer {
        0% {
          left: -80%;
        }

        55% {
          left: 130%;
        }

        100% {
          left: 130%;
        }
      }

      .rgt-cta {
        font-family: "Poppins", sans-serif;
        font-size: 14px;
        font-weight: 700;
        color: #fff;
        white-space: nowrap;
        letter-spacing: 0.01em;
        position: relative;
        z-index: 1;
      }

      /* ── MODAL: positioned ABOVE the button ── */
      .rgt-modal .modal-dialog {
        max-width: 320px;
        margin: 0;
        position: fixed;
        /* top & left are set dynamically by JS */
        transition:
          opacity 0.25s ease,
          transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1);
        opacity: 0;
        transform: translateY(12px);
        /* slides UP into view */
        pointer-events: none;
      }

      .rgt-modal.show .modal-dialog {
        opacity: 1;
        transform: translateY(0);
        pointer-events: auto;
      }

      .rgt-modal .modal-content {
        border-radius: 20px;
        border: none;
        overflow: hidden;
        box-shadow: 0 24px 48px rgba(0, 0, 0, 0.15);
        font-family: "Poppins", sans-serif;
        background: var(--surface);
      }

      /* header */
      .rgt-mhdr {
        position: relative;
        padding: 0;
        /* background: linear-gradient(145deg, #0f2b3d, #1e4a6e); */
        overflow: hidden;
      }

      .rgt-mhdr::after {
        content: "";
        position: absolute;
        bottom: -1px;
        left: 0;
        right: 0;
        height: 20px;
        background: var(--surface);
        clip-path: ellipse(110% 100% at 50% 100%);
      }

      .rgt-hdr-dots {
        position: absolute;
        top: 0;
        right: 0;
        width: 80px;
        height: 100%;
        /* background-image: radial-gradient(circle, rgb(0 0 0 / 35%) 1.5px, #cfbebe00 1.5px); */
        background-size: 12px 12px;
        pointer-events: none;
      }

      .rgt-hdr-inner {
        padding: 18px 18px 15px;
        position: relative;
        border-bottom: 2px solid #293595;
        z-index: 1;
      }

      .rgt-hdr-topbar {
        width: 28px;
        height: 3px;
        background: var(--green);
        border-radius: 3px;
        margin-bottom: 10px;
      }

      .rgt-hdr-row {
        display: flex;
        align-items: flex-start;
        gap: 10px;
      }

      .rgt-hdr-icon {
        width: 38px;
        height: 38px;
        background: rgba(255, 255, 255, 0.14);
        border: 1px solid #293595;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        color: #293595;
        flex-shrink: 0;
      }

      .rgt-hdr-title {
        font-size: 16px;
        font-weight: 800;
        color: #293595;
        line-height: 1.2;
      }

      .rgt-hdr-sub {
        font-size: 11px;
        color: rgba(0, 0, 0, 0.7);
        margin-top: 2px;
      }

      .rgt-hdr-close {
        position: absolute;
        top: 14px;
        right: 14px;
        opacity: 0.6;
        z-index: 2;
      }

      .rgt-hdr-close:hover {
        opacity: 1;
      }

      /* body */
      .rgt-mbody {
        padding: 9px 18px 18px;
        background: var(--surface);
      }

      .rgt-flabel {
        font-size: 11px;
        font-weight: 700;
        color: var(--navy);
        letter-spacing: 0.08em;
        margin-bottom: 5px;
        display: block;
      }

      .rgt-frow {
        position: relative;
        margin-bottom: 12px;
      }

      .rgt-ficon {
        position: absolute;
        left: 11px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 13px;
        color: var(--navy);
        pointer-events: none;
      }

      .rgt-input {
        width: 100%;
        border-radius: 10px;
        padding: 10px 12px 10px 36px;
        border: 1.5px solid var(--border);
        font-family: "Poppins", sans-serif;
        font-size: 13px;
        color: var(--text);
        background: var(--bg);
        transition:
          border-color 0.2s,
          box-shadow 0.2s,
          background 0.2s;
      }

      .rgt-input::placeholder {
        color: #808286;
        font-size: 12px;
      }

      .rgt-input:focus {
        outline: none;
        border-color: var(--navy);
        background: #fff;
        box-shadow: 0 0 0 3px var(--navy-mist);
      }

      .rgt-input.r-ok {
        border-color: var(--green);
        background: #f0fdf4;
      }

      .rgt-input.r-err {
        border-color: #ef4444;
        background: #fff5f5;
      }

      .rgt-errtxt {
        font-size: 10px;
        color: #dc2626;
        margin-top: 3px;
        padding-left: 4px;
        display: none;
      }

      .rgt-input.r-err ~ .rgt-errtxt {
        display: block;
      }

      .rgt-alert {
        border-radius: 10px;
        padding: 9px 12px;
        font-size: 12px;
        font-weight: 500;
        margin-bottom: 12px;
        display: none;
        align-items: center;
        gap: 8px;
        font-family: "Poppins", sans-serif;
      }

      .rgt-alert.r-ok {
        display: flex;
        background: #f0fdf4;
        color: #14532d;
        border-left: 4px solid var(--green);
      }

      .rgt-alert.r-err {
        display: flex;
        background: #fff5f5;
        color: #991b1b;
        border-left: 4px solid #ef4444;
      }

      .rgt-submit {
        width: 100%;
        padding: 11px;
        border-radius: 10px;
        border: none;
        background: linear-gradient(
          120deg,
          var(--navy) 0%,
          var(--navy-light) 60%,
          var(--green) 100%
        );
        color: #fff;
        font-family: "Poppins", sans-serif;
        font-size: 13.5px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.22s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        box-shadow: 0 4px 14px var(--navy-glow);
        position: relative;
        overflow: hidden;
      }

      .rgt-submit::after {
        content: "";
        position: absolute;
        top: 0;
        left: -80%;
        width: 50%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.16),
          transparent
        );
        transform: skewX(-20deg);
        transition: left 0.5s;
      }

      .rgt-submit:hover::after {
        left: 130%;
      }

      .rgt-submit:hover {
        transform: translateY(-1px);
        box-shadow: 0 8px 20px var(--navy-glow);
      }

      .rgt-trust {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding-top: 12px;
        margin-top: 12px;
        border-top: 1px solid var(--border);
      }

      .rgt-titem {
        display: flex;
        align-items: center;
        gap: 3px;
        font-size: 10px;
        color: var(--muted);
        font-weight: 500;
      }

      .rgt-titem i {
        font-size: 11px;
      }

<body>


    <!-- ══════════════════════════════════════════════════════════
       FLOATING BUTTON 1 — RIGHT  (DO NOT TOUCH)
  ══════════════════════════════════════════════════════════ -->
   <!-- ══════════════════════════════════════════════════════════
       FLOATING BUTTON 1 — RIGHT  (DO NOT TOUCH)
  ══════════════════════════════════════════════════════════ -->
    <div class="rgt-shell" id="callbackButton">
      <button
        class="rgt-pill"
        type="button"
        data-bs-toggle="modal"
        data-bs-target="#rgtModal"
        aria-label="Request a callback"
      >
        <div class="rgt-icon-half">
          <div class="rgt-ring"></div>
          <div class="rgt-dot"></div>
          <i
            class="bi bi-telephone-fill"
            style="position: relative; z-index: 1"
          ></i>
        </div>
        <div class="rgt-text-half">
          <span class="rgt-cta">Request a Callback</span>
        </div>
      </button>
    </div>

    <div
      class="modal fade rgt-modal"
      id="rgtModal"
      tabindex="-1"
      aria-labelledby="rgtModalTitle"
      aria-hidden="true"
    >
      <div class="modal-dialog" id="rgtModalDialog">
        <div class="modal-content">
          <div class="rgt-mhdr">
            <div class="rgt-hdr-dots"></div>
            <div class="rgt-hdr-inner">
              <div class="rgt-hdr-topbar"></div>
              <div class="rgt-hdr-row">
                <div class="rgt-hdr-icon">
                  <i class="bi bi-telephone-inbound-fill"></i>
                </div>
                <div>
                  <div class="rgt-hdr-title">Request a Callback</div>
                  <div class="rgt-hdr-sub">We'll call you back</div>
                </div>
              </div>
            </div>
            <button
              type="button"
              class="btn-close rgt-hdr-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="rgt-mbody">
            <form id="rgtForm" novalidate>
              <label class="rgt-flabel" for="rgtName">Full Name</label>
              <div class="rgt-frow">
                <input
                  type="text"
                  class="rgt-input"
                  id="rgtName"
                  placeholder="Enter Your Name"
                  required
                />
                <i class="bi bi-person rgt-ficon"></i>
                <div class="rgt-errtxt">Please enter your name.</div>
              </div>

              <label class="rgt-flabel" for="rgtPhone">Phone Number</label>
              <div class="rgt-frow phone-prefix-wrapper">
                <span class="phone-prefix">+91-</span>
                <input
                  type="tel"
                  class="rgt-input"
                  id="rgtPhone"
                  placeholder="Enter Phone Number"
                  required
                />
                <i class="bi bi-phone rgt-ficon"></i>
              </div>

              <label class="cb-flabel" for="callbackPhone">Email Address</label>

              <div class="cb-frow">
                <input
                  type="mail"
                  class="cb-input"
                  id="callbackPhone"
                  placeholder="you@example.com"
                  required
                />
                <i class="bi bi-envelope cb-ficon"></i>
              </div>
              <div class="rgt-alert" id="rgtAlert" role="alert"></div>
              <button type="submit" class="rgt-submit">
                <i class="bi bi-send-fill"></i> Submit Info
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <!-- floting btn end -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Floating Button 1 — RIGHT (DO NOT TOUCH) -->
    <script>
      (function () {
        "use strict";

        function validPhone(p) {
          return p.replace(/\D/g, "").length >= 10;
        }

        const modalEl = document.getElementById("rgtModal");
        const modalDialog = document.getElementById("rgtModalDialog");
        const buttonShell = document.getElementById("callbackButton");
        const bsModal = new bootstrap.Modal(modalEl);
        const form = document.getElementById("rgtForm");
        const nameEl = document.getElementById("rgtName");
        const phoneEl = document.getElementById("rgtPhone");
        const alertEl = document.getElementById("rgtAlert");

        const DIALOG_WIDTH = 320;
        const GAP = 10; // gap between modal bottom and button top

        function positionModalAboveButton() {
          const btnRect = buttonShell.getBoundingClientRect();

          // Align right edge of modal with right edge of button
          const right = window.innerWidth - btnRect.right;
          const bottom = window.innerHeight - btnRect.top + GAP;

          // Use bottom + right positioning so it sits directly above the button
          modalDialog.style.left = "auto";
          modalDialog.style.top = "auto";
          modalDialog.style.right = right + "px";
          modalDialog.style.bottom = bottom + "px";
          modalDialog.style.width = DIALOG_WIDTH + "px";
        }

        modalEl.addEventListener("show.bs.modal", positionModalAboveButton);
        window.addEventListener("resize", () => {
          if (modalEl.classList.contains("show")) positionModalAboveButton();
        });

        modalEl.addEventListener("hidden.bs.modal", () => {
          form.reset();
          nameEl.classList.remove("r-ok", "r-err");
          phoneEl.classList.remove("r-ok", "r-err");
          alertEl.className = "rgt-alert";
          alertEl.innerHTML = "";
        });

        nameEl.addEventListener("input", () => {
          const ok = !!nameEl.value.trim();
          nameEl.classList.toggle("r-ok", ok);
          nameEl.classList.toggle("r-err", !ok);
        });
        phoneEl.addEventListener("input", () => {
          const ok = validPhone(phoneEl.value);
          phoneEl.classList.toggle("r-ok", ok);
          phoneEl.classList.toggle("r-err", !ok);
        });

        form.addEventListener("submit", (e) => {
          e.preventDefault();
          let isValid = true;

          if (!nameEl.value.trim()) {
            nameEl.classList.add("r-err");
            nameEl.classList.remove("r-ok");
            isValid = false;
          } else {
            nameEl.classList.add("r-ok");
            nameEl.classList.remove("r-err");
          }

          if (!validPhone(phoneEl.value)) {
            phoneEl.classList.add("r-err");
            phoneEl.classList.remove("r-ok");
            isValid = false;
          } else {
            phoneEl.classList.add("r-ok");
            phoneEl.classList.remove("r-err");
          }

          if (isValid) {
            alertEl.className = "rgt-alert r-ok";
            alertEl.innerHTML = `<i class="bi bi-check-circle-fill" style="font-size:16px;color:#1A7F3C;"></i><span>Done! We'll call ${phoneEl.value.trim()}.</span>`;
            setTimeout(() => bsModal.hide(), 2500);
          } else {
            alertEl.className = "rgt-alert r-err";
            alertEl.innerHTML = `<i class="bi bi-exclamation-circle-fill" style="font-size:16px;color:#ef4444;"></i><span>Please fill the detail.</span>`;
          }
        });
      })();
    </script>


</body>
</html>
